<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Current Affairs Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:#080d1a;
      font-family:'DM Sans',sans-serif;
      color:#e8edf8;
      min-height:100vh;
    }

    /* HEADER */
    header{
      padding:22px 28px 16px;
      background:#0d1221;
      position:sticky;
      top:0;
      z-index:100;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .header-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .brand{display:flex;align-items:center;gap:10px;}

    .live-dot{
      width:9px;height:9px;
      border-radius:50%;
      background:#ef4444;
      animation:pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}
      50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}
    }

    header h1{
      font-family:'Playfair Display',serif;
      font-size:26px;
      font-weight:800;
      letter-spacing:-0.5px;
      background:linear-gradient(135deg,#60a5fa,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .header-right{display:flex;align-items:center;gap:10px;}

    #lastUpdated{
      font-size:12px;
      color:#4a5568;
      background:#141929;
      padding:4px 12px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.05);
    }

    /* SEARCH */
    #searchInput{
      width:100%;
      padding:11px 16px;
      background:#141929;
      border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;
      color:#e8edf8;
      font-family:'DM Sans',sans-serif;
      font-size:14px;
      outline:none;
      margin-bottom:14px;
      transition:border-color .2s;
    }
    #searchInput::placeholder{color:#3d4966;}
    #searchInput:focus{border-color:#4f8ef7;}

    /* CATEGORY BUTTONS */
    .categories{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .categories button{
      padding:7px 16px;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      background:#141929;
      color:#7a8ba8;
      cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:13px;
      font-weight:500;
      transition:all .2s;
    }
    .categories button:hover{border-color:#4f8ef7;color:#60a5fa;}
    .categories button.active{background:#2563eb;border-color:#2563eb;color:#fff;}

    /* BREAKING TICKER */
    .ticker-wrap{
      overflow:hidden;
      background:linear-gradient(90deg,#1e1060,#1a3a8f);
      padding:9px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .ticker-inner{
      display:inline-block;
      white-space:nowrap;
      animation:scroll 35s linear infinite;
      font-size:13px;
      color:#bfdbfe;
      font-weight:500;
      padding-left:100%;
    }
    @keyframes scroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    /* GRID */
    #newsContainer{
      padding:24px 28px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:20px;
    }

    /* CARD */
    .news-card{
      background:#0d1221;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      transition:transform .25s,box-shadow .25s,border-color .25s;
      animation:fadeUp .4s ease both;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    .news-card:hover{
      transform:translateY(-5px);
      box-shadow:0 16px 48px rgba(0,0,0,.5);
      border-color:rgba(79,142,247,.25);
    }

    /* IMAGE */
    .card-img{
      width:100%;
      height:200px;
      object-fit:cover;
      display:block;
      background:#141929;
      transition:transform .4s;
    }
    .news-card:hover .card-img{transform:scale(1.03);}

    .img-wrap{overflow:hidden;height:200px;position:relative;}

    .source-tag{
      position:absolute;
      bottom:10px;left:10px;
      background:rgba(0,0,0,.75);
      color:#bfdbfe;
      font-size:11px;
      font-weight:600;
      padding:3px 10px;
      border-radius:20px;
      backdrop-filter:blur(4px);
      letter-spacing:.3px;
    }

    /* CONTENT */
    .card-body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1;}

    .card-body h2{
      font-size:15.5px;
      font-weight:600;
      line-height:1.45;
      margin-bottom:9px;
      color:#dde5f5;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-body p{
      font-size:13px;
      color:#5a6a88;
      line-height:1.6;
      margin-bottom:14px;
      flex:1;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:13px;
    }

    .card-author{font-size:12px;color:#3d4d68;}
    .card-date{
      font-size:11px;
      color:#3d4d68;
      background:#141929;
      padding:3px 9px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .read-btn{
      display:block;
      text-align:center;
      text-decoration:none;
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      color:#fff;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      font-weight:500;
      transition:opacity .2s,transform .1s;
      letter-spacing:.2px;
    }
    .read-btn:hover{opacity:.88;transform:translateY(-1px);}

    /* LOADING */
    .loading{
      grid-column:1/-1;
      text-align:center;
      padding:80px 20px;
      color:#3d4d68;
      font-size:18px;
    }
    .spinner{
      width:36px;height:36px;
      border:3px solid rgba(79,142,247,.15);
      border-top-color:#4f8ef7;
      border-radius:50%;
      animation:spin .8s linear infinite;
      margin:0 auto 16px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SKELETON */
    .skel{
      background:#0d1221;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;
      overflow:hidden;
    }
    .skel-img{height:200px;background:#141929;position:relative;overflow:hidden;}
    .skel-body{padding:16px 18px;}
    .skel-line{height:13px;background:#141929;border-radius:6px;margin-bottom:10px;position:relative;overflow:hidden;}
    .skel-line.w80{width:80%;}
    .skel-line.w60{width:60%;}
    .skel-line.w40{width:40%;}
    .skel-img::after,.skel-line::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
      animation:shimmer 1.6s infinite;
    }
    @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

    /* FOOTER */
    footer{
      text-align:center;
      padding:20px;
      color:#2a3550;
      font-size:13px;
      border-top:1px solid rgba(255,255,255,0.04);
    }

    @media(max-width:600px){
      #newsContainer{padding:14px;gap:14px;}
      header{padding:14px 16px 12px;}
      header h1{font-size:20px;}
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="live-dot"></div>
      <h1>🌍 Current Affairs</h1>
    </div>
    <div class="header-right">
      <span id="lastUpdated">Not loaded</span>
    </div>
  </div>

  <input type="text" id="searchInput" placeholder="Search headlines…" autocomplete="off"/>

  <div class="categories">
    <button class="active" onclick="fetchNews('hindu',this)">The Hindu</button>
    <button onclick="fetchNews('toi',this)">Times of India</button>
    <button onclick="fetchNews('indianexpress',this)">Indian Express</button>
    <button onclick="fetchNews('bbc',this)">BBC</button>
  </div>
</header>

<div class="ticker-wrap">
  <div class="ticker-inner" id="ticker">⚡ Loading headlines…</div>
</div>

<main id="newsContainer"></main>

<footer>Auto-refreshes every 5 minutes &nbsp;·&nbsp; Powered by RSS</footer>

<script>
  const container = document.getElementById("newsContainer");
  const searchInput = document.getElementById("searchInput");
  const tickerEl = document.getElementById("ticker");
  const lastUpdatedEl = document.getElementById("lastUpdated");

  let allArticles = [];
  let currentSource = "hindu";

  const feeds = {
    hindu:         "https://www.thehindu.com/feeder/default.rss",
    toi:           "https://timesofindia.indiatimes.com/rssfeedstopstories.cms",
    indianexpress: "https://indianexpress.com/feed/",
    bbc:           "https://feeds.bbci.co.uk/news/rss.xml"
  };

  const sourceNames = {
    hindu:"The Hindu", toi:"Times of India",
    indianexpress:"Indian Express", bbc:"BBC News"
  };

  /* ── Extract best image from RSS item ── */
  function extractImage(item) {
    // 1. direct thumbnail
    if (item.thumbnail && item.thumbnail.startsWith("http")) return item.thumbnail;
    // 2. enclosure
    if (item.enclosure && item.enclosure.link && item.enclosure.link.startsWith("http")) return item.enclosure.link;
    // 3. media content via raw
    if (item.content) {
      const m = item.content.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m) return m[1];
    }
    // 4. description img tag
    if (item.description) {
      const m = item.description.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m) return m[1];
    }
    return null;
  }

  /* ── Skeletons ── */
  function showSkeletons() {
    container.innerHTML = Array(6).fill(`
      <div class="skel">
        <div class="skel-img"></div>
        <div class="skel-body">
          <div class="skel-line w80"></div>
          <div class="skel-line"></div>
          <div class="skel-line w60"></div>
          <div class="skel-line w40"></div>
        </div>
      </div>`).join("");
  }

  /* ── Fetch ── */
  async function fetchNews(source, btn) {
    if (btn) {
      document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
    currentSource = source;
    showSkeletons();

    const proxies = [
      url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`,
      url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
    ];

    const rssUrl = feeds[source];
    let articles = null;

    // Try rss2json first
    try {
      const res = await fetch(proxies[0](rssUrl));
      const data = await res.json();
      if (data.status === "ok" && data.items && data.items.length) {
        articles = data.items;
      }
    } catch(e) {}

    // Fallback: allorigins + manual parse
    if (!articles) {
      try {
        const res = await fetch(proxies[1](rssUrl));
        const data = await res.json();
        const xml = new DOMParser().parseFromString(data.contents, "text/xml");
        const items = [...xml.querySelectorAll("item")];
        articles = items.map(el => ({
          title: el.querySelector("title")?.textContent || "",
          description: el.querySelector("description")?.textContent || "",
          link: el.querySelector("link")?.textContent || "",
          pubDate: el.querySelector("pubDate")?.textContent || "",
          author: el.querySelector("author")?.textContent || el.querySelector("dc\\:creator")?.textContent || "",
          thumbnail: el.querySelector("media\\:thumbnail")?.getAttribute("url")
            || el.querySelector("media\\:content")?.getAttribute("url") || null,
          content: el.querySelector("content\\:encoded")?.textContent || "",
          enclosure: {link: el.querySelector("enclosure")?.getAttribute("url") || ""}
        }));
      } catch(e) {
        container.innerHTML = `<div class="loading">
          <div style="font-size:40px;margin-bottom:12px">📡</div>
          <p style="color:#5a6a88">Could not load news. Check your internet connection.</p>
        </div>`;
        return;
      }
    }

    allArticles = articles;
    render(allArticles, source);
    tickerEl.textContent = "⚡  " + allArticles.slice(0,8).map(a=>a.title).join("   •   ");
    lastUpdatedEl.textContent = new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
  }

  /* ── Render ── */
  function render(articles, source) {
    container.innerHTML = "";
    if (!articles.length) {
      container.innerHTML = `<div class="loading"><p>No articles found.</p></div>`;
      return;
    }

    const srcLabel = sourceNames[source || currentSource] || "News";

    articles.forEach((a, i) => {
      const img = extractImage(a);
      const desc = (a.description || "").replace(/<[^>]+>/g,"").replace(/&[a-z]+;/g," ").trim().slice(0,140) || "Read the full article for details.";
      const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}) : "";
      const author = (a.author || "").replace(/<[^>]+>/g,"").trim() || srcLabel;

      const card = document.createElement("div");
      card.className = "news-card";
      card.style.animationDelay = (i * 0.045) + "s";

      card.innerHTML = `
        <div class="img-wrap">
          ${img
            ? `<img class="card-img" src="${img}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div style=height:200px;background:#141929;display:flex;align-items:center;justify-content:center><span style=font-size:36px>📰</span></div>'">`
            : `<div style="height:200px;background:#141929;display:flex;align-items:center;justify-content:center"><span style="font-size:36px">📰</span></div>`
          }
          <span class="source-tag">${srcLabel}</span>
        </div>
        <div class="card-body">
          <h2>${a.title || "Untitled"}</h2>
          <p>${desc}</p>
          <div class="card-meta">
            <span class="card-author">✍ ${author.slice(0,28)}</span>
            <span class="card-date">${date}</span>
          </div>
          <a class="read-btn" href="${a.link}" target="_blank" rel="noopener">Read Full Article →</a>
        </div>`;
      container.appendChild(card);
    });
  }

  /* ── Search ── */
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase().trim();
    render(q ? allArticles.filter(a =>
      (a.title||"").toLowerCase().includes(q) ||
      (a.description||"").toLowerCase().includes(q)
    ) : allArticles, currentSource);
  });

  /* ── Auto refresh ── */
  setInterval(() => fetchNews(currentSource, null), 300000);

  /* ── Init ── */
  fetchNews("hindu", null);
</script>
</body>
</html>
